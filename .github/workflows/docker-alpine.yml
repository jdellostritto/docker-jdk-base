name: Build and Push Alpine Docker Base Image

on:
  push:
    branches: [ master ]
    paths:
      - 'flip-zulu-alpine21/**'
      - '.github/workflows/docker-alpine.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'flip-zulu-alpine21/**'
  workflow_dispatch:

jobs:
  build-alpine:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build Alpine image
        uses: docker/build-push-action@v5
        with:
          context: ./flip-zulu-alpine21
          push: false
          load: true
          tags: ghcr.io/${{ github.repository }}/jdk-alpine:latest
      
      - name: Run Alpine image tests
        run: |
          cd flip-zulu-alpine21
          docker run --rm ghcr.io/${{ github.repository }}/jdk-alpine:latest java -version
          echo "Alpine base image test passed!"
      
      - name: Push Alpine image to GHCR
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v5
        with:
          context: ./flip-zulu-alpine21
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/jdk-alpine:latest
            ghcr.io/${{ github.repository }}/jdk-alpine:alpine-jdk21
            ghcr.io/${{ github.repository }}/jdk-alpine:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
